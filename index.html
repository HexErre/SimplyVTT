<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenVTT — Virtual Tabletop</title>
    <meta name="description" content="Virtual tabletop P2P per giochi di ruolo, senza server centrali.">
    <style>
        :root {
            --bg-darker: #0f1115;
            --bg-dark: #15181e;
            --bg-surface: #1e222b;
            --bg-surface-hover: #2a2f3a;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --accent-focus: rgba(59, 130, 246, 0.25);
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 8px;
            --radius-sm: 4px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.5);
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            color-scheme: dark;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 14px;
            line-height: 1.5;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased
        }

        button {
            background: var(--bg-surface);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 7px 14px;
            cursor: pointer;
            font-family: inherit;
            font-size: .85rem;
            font-weight: 500;
            transition: all .15s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px
        }

        button:hover {
            background: var(--bg-surface-hover);
            border-color: rgba(255, 255, 255, .15)
        }

        button.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff
        }

        button.primary:hover {
            background: var(--accent-hover)
        }

        button.active {
            background: var(--accent-focus);
            color: var(--accent);
            border-color: var(--accent)
        }

        input[type="text"],
        input[type="number"],
        textarea {
            background: var(--bg-darker);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 7px 10px;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: .85rem;
            outline: none;
            transition: border .15s
        }

        input:focus,
        textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-focus)
        }

        ::-webkit-scrollbar {
            width: 6px
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-darker)
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-surface-hover);
            border-radius: 99px
        }

        #welcome-screen {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center
        }

        #welcome-screen.hidden {
            display: none
        }

        .welcome-card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 480px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .6);
            text-align: center
        }

        .welcome-card h1 {
            font-size: 2rem;
            margin-bottom: 4px
        }

        .welcome-card h1 span {
            color: var(--accent)
        }

        .welcome-card .subtitle {
            color: var(--text-muted);
            font-size: .9rem;
            margin-bottom: 32px
        }

        .welcome-card .divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 24px 0
        }

        .welcome-card .section-label {
            color: var(--text-secondary);
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 12px
        }

        .welcome-card .btn-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 8px
        }

        .welcome-card .btn-row button {
            flex: 1;
            padding: 14px 20px;
            font-size: .95rem
        }

        .welcome-card .join-row {
            display: flex;
            gap: 8px
        }

        .welcome-card .join-row input {
            flex: 1;
            padding: 12px;
            font-size: .95rem;
            text-align: center;
            letter-spacing: 1px
        }

        .welcome-card .status-text {
            margin-top: 12px;
            font-size: .85rem;
            color: var(--text-muted)
        }

        .welcome-card .status-text.error {
            color: var(--accent-danger)
        }

        .welcome-card .status-text.success {
            color: var(--accent-success)
        }

        #app {
            display: none;
            flex-direction: column;
            height: 100vh
        }

        #app.show {
            display: flex
        }

        #toolbar {
            height: 44px;
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 12px;
            z-index: 30
        }

        #toolbar .title {
            font-weight: 700;
            font-size: 1rem;
            margin-right: auto;
            white-space: nowrap
        }

        #toolbar .title em {
            color: var(--accent);
            font-style: normal
        }

        #main {
            display: flex;
            flex: 1;
            overflow: hidden
        }

        .panel {
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            z-index: 10;
            flex-shrink: 0
        }

        #left-panel {
            width: 260px;
            border-right: 1px solid var(--border)
        }

        #right-panel {
            width: 300px;
            border-left: 1px solid var(--border)
        }

        .panel-tabs {
            display: flex;
            border-bottom: 1px solid var(--border)
        }

        .panel-tabs button {
            flex: 1;
            border: none;
            border-radius: 0;
            background: transparent;
            padding: 10px 8px;
            font-size: .8rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all .15s
        }

        .panel-tabs button.active {
            color: var(--accent);
            border-bottom-color: var(--accent)
        }

        .panel-tabs button:hover {
            color: var(--text-primary);
            background: var(--bg-surface-hover)
        }

        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px
        }

        #canvas-area {
            flex: 1;
            position: relative;
            background: #000;
            overflow: hidden;
            cursor: grab
        }

        #canvas-area:active {
            cursor: grabbing
        }

        #map-canvas {
            display: block
        }

        #bottom-bar {
            position: absolute;
            bottom: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(30, 34, 43, .85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, .12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 8px 16px;
            display: flex;
            gap: 6px;
            align-items: center
        }

        #bottom-bar .label {
            color: var(--text-secondary);
            font-size: .8rem;
            font-weight: 600;
            margin-right: 6px
        }

        #bottom-bar button {
            width: 38px;
            height: 38px;
            padding: 0;
            font-weight: 700;
            font-size: .75rem
        }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px
        }

        .list-header span {
            font-size: .75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .list-item {
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: .85rem;
            background: var(--bg-darker);
            margin-bottom: 4px;
            transition: all .1s;
            border: 1px solid transparent
        }

        .list-item:hover {
            background: var(--bg-surface-hover)
        }

        .list-item.active {
            background: var(--accent-focus);
            border-color: var(--accent)
        }

        .list-item .name {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1
        }

        .list-item .badge {
            font-size: .7rem;
            color: var(--text-muted)
        }

        .empty-hint {
            text-align: center;
            padding: 20px 0;
            color: var(--text-muted);
            font-size: .8rem
        }

        #left-panel.drag-over .panel-body {
            outline: 2px dashed var(--accent);
            outline-offset: -4px;
            background: var(--accent-focus)
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .chat-msg {
            background: var(--bg-darker);
            padding: 8px 10px;
            border-radius: var(--radius);
            font-size: .85rem
        }

        .chat-msg.system {
            border-left: 3px solid var(--accent-success);
            opacity: .8
        }

        .chat-msg .sender {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: .75rem;
            margin-bottom: 2px
        }

        .chat-msg .roll-result {
            margin-top: 4px;
            padding: 4px 8px;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            display: flex;
            justify-content: space-between;
            font-size: .8rem
        }

        .chat-msg .roll-result .val {
            font-weight: 700;
            color: var(--accent-hover)
        }

        .chat-msg .roll-result .crit {
            color: var(--accent-success)
        }

        .chat-msg .roll-result .fail {
            color: var(--accent-danger)
        }

        #chat-input-area {
            padding: 8px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px
        }

        #chat-input-area input {
            flex: 1
        }

        .player-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 0;
            font-size: .85rem
        }

        .player-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0
        }

        #toast {
            position: fixed;
            top: 60px;
            right: 20px;
            z-index: 999;
            background: var(--accent-success);
            color: #fff;
            padding: 10px 20px;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: .85rem;
            box-shadow: var(--shadow);
            opacity: 0;
            transform: translateY(-10px);
            transition: all .3s;
            pointer-events: none
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0)
        }

        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, .6);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center
        }

        .modal-bg.show {
            display: flex
        }

        .modal {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 28px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .5)
        }

        .modal h3 {
            margin-bottom: 12px;
            font-size: 1.1rem
        }

        .modal .note {
            font-size: .8rem;
            color: var(--text-muted);
            margin-bottom: 16px
        }

        .modal .invite-code {
            background: var(--bg-darker);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            text-align: center;
            margin: 12px 0;
            color: var(--accent-hover);
            user-select: all;
            word-break: break-all;
            letter-spacing: 2px
        }

        .modal .actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end
        }

        .role-badge {
            font-size: .65rem;
            padding: 2px 6px;
            border-radius: 99px;
            font-weight: 600;
            margin-left: auto
        }

        .role-gm {
            background: var(--accent-warning);
            color: #000
        }

        .role-player {
            background: var(--accent);
            color: #fff
        }

        .conn-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 8px
        }

        .conn-dot.online {
            background: var(--accent-success)
        }

        .conn-dot.offline {
            background: var(--accent-danger)
        }

        @media(max-width:900px) {
            #left-panel {
                width: 200px
            }

            #right-panel {
                width: 240px
            }
        }

        @media(max-width:700px) {

            #left-panel,
            #right-panel {
                display: none
            }
        }
    </style>
</head>

<body>

    <div id="welcome-screen">
        <div class="welcome-card">
            <h1>&#x1F3B2; <span>Open</span>VTT</h1>
            <p class="subtitle">Virtual Tabletop &mdash; P2P, senza server</p>
            <div class="section-label">Scegli il tuo ruolo</div>
            <div class="btn-row">
                <button class="primary" id="btn-gm">&#x1F451; Game Master</button>
                <button id="btn-player">&#x1F3AE; Giocatore</button>
            </div>
            <hr class="divider">
            <div id="join-section" style="display:none">
                <div class="section-label">Inserisci codice sessione</div>
                <div class="join-row">
                    <input type="text" id="join-code-input" placeholder="ES: ABCD-1234" spellcheck="false"
                        autocomplete="off" />
                    <button class="primary" id="btn-join">Entra</button>
                </div>
            </div>
            <p id="welcome-status" class="status-text" style="display:none"></p>
        </div>
    </div>

    <div id="app">
        <div id="toolbar">
            <div class="title">&#x1F3B2; <em>Open</em>VTT <span id="toolbar-role" class="role-badge"></span> <span
                    id="conn-indicator" class="conn-dot offline" title="Connessione P2P"></span></div>
            <span id="toolbar-campaign" style="color:var(--text-secondary);font-size:.85rem"></span>
            <button id="btn-add-scene" title="Add Scene" style="display:none">+ Scene</button>
        </div>
        <div id="main">
            <div class="panel" id="left-panel">
                <div class="panel-tabs">
                    <button class="active" data-tab="scenes">&#x1F5FA; Scenes</button>
                    <button data-tab="assets">&#x1F4C1; Assets</button>
                </div>
                <div class="panel-body" id="left-panel-body"></div>
            </div>
            <div id="canvas-area">
                <canvas id="map-canvas"></canvas>
                <div id="bottom-bar">
                    <span class="label">&#x1F3B2; Quick Roll</span>
                    <button onclick="rollDice(4)">d4</button>
                    <button onclick="rollDice(6)">d6</button>
                    <button onclick="rollDice(8)">d8</button>
                    <button onclick="rollDice(10)">d10</button>
                    <button onclick="rollDice(12)">d12</button>
                    <button onclick="rollDice(20)">d20</button>
                    <button onclick="rollDice(100)">d100</button>
                </div>
            </div>
            <div class="panel" id="right-panel">
                <div class="panel-tabs">
                    <button class="active" data-tab="chat">&#x1F4AC; Chat</button>
                    <button data-tab="players">&#x1F465; Players</button>
                </div>
                <div id="right-panel-content" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
                    <div id="chat-messages"></div>
                    <div id="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type or /roll 2d6+3..." />
                        <button class="primary" onclick="sendChatMessage()">&#x27A4;</button>
                    </div>
                    <div id="players-panel" style="display:none;padding:12px;flex:1;overflow-y:auto">
                        <div class="list-header"><span>Connected</span></div>
                        <div id="players-list"></div>
                        <div id="invite-btn-wrap" style="margin-top:16px;display:none">
                            <button class="primary" style="width:100%" onclick="showInviteModal()">&#x1F517; Link Invito
                                Sessione</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-bg" id="invite-modal-bg">
        <div class="modal">
            <h3>&#x1F517; Invita Giocatori</h3>
            <p class="note">Condividi questo codice con i tuoi giocatori. Dovranno selezionare "Giocatore" nella
                schermata iniziale e inserirlo.</p>
            <div class="invite-code" id="invite-code-display">---</div>
            <div class="actions">
                <button onclick="copyInviteCode()">&#x1F4CB; Copia Codice</button>
                <button onclick="closeModal('invite-modal-bg')">Chiudi</button>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <!-- ====== PEERJS INLINE ====== -->

    </script>

    <script>
        /* =========================================================
           OpenVTT - Standalone P2P Virtual Tabletop
           ========================================================= */

        // ================ STATE ================
        var state = {
            role: null,
            playerName: 'GM',
            campaign: { id: uid(), name: 'Nuova Campagna' },
            scenes: {},
            assets: {},
            activeSceneId: null,
            activeLeftTab: 'scenes',
            activeRightTab: 'chat',
            chat: [],
            players: [],
            viewport: { x: 0, y: 0, zoom: 1 },
            isDragging: false,
            lastMouse: { x: 0, y: 0 },
            inviteCode: null,
        };

        // ================ NETWORKING STATE ================
        var net = {
            peer: null,         // PeerJS instance
            connections: [],    // GM: array of DataConnection to each player
            gmConn: null,       // Player: DataConnection to GM
            roomId: null,       // Full PeerJS peer ID
        };

        var ROOM_PREFIX = 'openvtt-room-';
        var PLAYER_COLORS = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];
        var colorIdx = 0;

        function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

        function genRoomCode() {
            var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            var c = '';
            for (var i = 0; i < 4; i++) c += chars[Math.floor(Math.random() * chars.length)];
            c += '-';
            for (var j = 0; j < 4; j++) c += chars[Math.floor(Math.random() * chars.length)];
            return c;
        }

        // ================ WELCOME FLOW ================
        var welcomeStatus = document.getElementById('welcome-status');

        function setWelcomeStatus(msg, type) {
            welcomeStatus.textContent = msg;
            welcomeStatus.className = 'status-text' + (type ? ' ' + type : '');
            welcomeStatus.style.display = '';
        }

        document.getElementById('btn-gm').addEventListener('click', function () {
            startAsGM();
        });

        document.getElementById('btn-player').addEventListener('click', function () {
            document.getElementById('join-section').style.display = '';
            document.getElementById('join-code-input').focus();
        });

        document.getElementById('btn-join').addEventListener('click', function () { joinSession(); });
        document.getElementById('join-code-input').addEventListener('keydown', function (e) { if (e.key === 'Enter') joinSession(); });

        // ---- GM START ----
        function startAsGM() {
            state.role = 'gm';
            state.playerName = 'GM';
            state.inviteCode = genRoomCode();
            state.players = [{ id: 'gm', name: 'GM (Tu)', color: '#10b981', role: 'gm' }];

            var sid = uid();
            state.scenes[sid] = createScene(sid, 'Scena 1');
            state.activeSceneId = sid;

            setWelcomeStatus('Connessione al signaling server...', '');

            // Disable buttons while connecting
            document.getElementById('btn-gm').disabled = true;
            document.getElementById('btn-player').disabled = true;

            net.roomId = ROOM_PREFIX + state.inviteCode.replace('-', '').toLowerCase();

            net.peer = new Peer(net.roomId, { debug: 0 });

            net.peer.on('open', function (id) {
                console.log('[GM] Peer open:', id);
                setWelcomeStatus('Stanza pronta! Codice: ' + state.inviteCode, 'success');
                enterApp();
            });

            net.peer.on('connection', function (conn) {
                handleNewPlayerConnection(conn);
            });

            net.peer.on('error', function (err) {
                console.error('[GM] Peer error:', err);
                if (err.type === 'unavailable-id') {
                    setWelcomeStatus('Codice stanza gia\' in uso! Riprova.', 'error');
                    document.getElementById('btn-gm').disabled = false;
                    document.getElementById('btn-player').disabled = false;
                    // Generate new code and retry
                    state.inviteCode = genRoomCode();
                    setTimeout(function () { startAsGM(); }, 500);
                } else {
                    setWelcomeStatus('Errore: ' + (err.message || err.type), 'error');
                    document.getElementById('btn-gm').disabled = false;
                    document.getElementById('btn-player').disabled = false;
                }
            });

            net.peer.on('disconnected', function () {
                console.warn('[GM] Peer disconnected from signaling, attempting reconnect...');
                updateConnIndicator(false);
                try { net.peer.reconnect(); } catch (e) { }
            });
        }

        // ---- GM: Handle new player connecting ----
        function handleNewPlayerConnection(conn) {
            console.log('[GM] New player connection:', conn.peer);

            conn.on('open', function () {
                net.connections.push(conn);
                var pColor = PLAYER_COLORS[colorIdx % PLAYER_COLORS.length];
                colorIdx++;

                conn._playerInfo = { id: conn.peer, name: 'Giocatore ' + net.connections.length, color: pColor, role: 'player' };
                state.players.push(conn._playerInfo);

                // Send initial state to new player
                var syncMsg = {
                    type: 'SYNC_FULL',
                    scenes: serializeScenes(),
                    activeSceneId: state.activeSceneId,
                    chat: state.chat,
                    players: state.players,
                    playerInfo: conn._playerInfo,
                    campaign: state.campaign
                };
                conn.send(syncMsg);

                // Notify all about new player
                broadcastFromGM({ type: 'PLAYER_LIST', players: state.players });

                addSystemChat(conn._playerInfo.name + ' si e\' unito alla sessione!');
                broadcastFromGM({ type: 'CHAT', msg: { sender: 'Sistema', text: conn._playerInfo.name + ' si e\' unito alla sessione!', rolls: [], system: true } });

                renderPlayers();
                updateConnIndicator(true);
            });

            conn.on('data', function (data) {
                handleGMReceive(data, conn);
            });

            conn.on('close', function () {
                // Remove player
                net.connections = net.connections.filter(function (c) { return c !== conn; });
                if (conn._playerInfo) {
                    state.players = state.players.filter(function (p) { return p.id !== conn._playerInfo.id; });
                    addSystemChat(conn._playerInfo.name + ' ha lasciato la sessione.');
                    broadcastFromGM({ type: 'PLAYER_LIST', players: state.players });
                    broadcastFromGM({ type: 'CHAT', msg: { sender: 'Sistema', text: conn._playerInfo.name + ' ha lasciato la sessione.', rolls: [], system: true } });
                    renderPlayers();
                }
                if (net.connections.length === 0) updateConnIndicator(false);
            });

            conn.on('error', function (err) {
                console.error('[GM] Connection error:', err);
            });
        }

        // ---- GM: Receive message from a player ----
        function handleGMReceive(data, fromConn) {
            if (!data || !data.type) return;

            if (data.type === 'CHAT') {
                state.chat.push(data.msg);
                renderChat();
                // Broadcast to all OTHER players
                broadcastFromGM({ type: 'CHAT', msg: data.msg }, fromConn);
            }
            else if (data.type === 'DICE_ROLL') {
                state.chat.push(data.msg);
                renderChat();
                broadcastFromGM({ type: 'CHAT', msg: data.msg }, fromConn);
            }
        }

        // ---- GM: Broadcast to all connected players ----
        function broadcastFromGM(data, excludeConn) {
            for (var i = 0; i < net.connections.length; i++) {
                if (net.connections[i] !== excludeConn && net.connections[i].open) {
                    try { net.connections[i].send(data); } catch (e) { }
                }
            }
        }

        // ---- PLAYER: JOIN ----
        function joinSession() {
            var code = document.getElementById('join-code-input').value.trim().toUpperCase();
            if (!code || code.length < 4) {
                setWelcomeStatus('Inserisci un codice valido (ricevuto dal GM).', 'error');
                return;
            }

            state.role = 'player';
            state.inviteCode = code;

            setWelcomeStatus('Connessione in corso...', '');
            document.getElementById('btn-join').disabled = true;

            var targetId = ROOM_PREFIX + code.replace('-', '').toLowerCase();

            net.peer = new Peer({ debug: 0 });

            net.peer.on('open', function () {
                console.log('[Player] My peer open, connecting to GM:', targetId);
                setWelcomeStatus('Collegamento al GM...', '');

                net.gmConn = net.peer.connect(targetId, { reliable: true });

                net.gmConn.on('open', function () {
                    console.log('[Player] Connected to GM!');
                    setWelcomeStatus('Connesso!', 'success');
                    updateConnIndicator(true);
                });

                net.gmConn.on('data', function (data) {
                    handlePlayerReceive(data);
                });

                net.gmConn.on('close', function () {
                    console.warn('[Player] Connection to GM closed');
                    updateConnIndicator(false);
                    addSystemChat('Connessione con il GM persa.');
                    renderChat();
                });

                net.gmConn.on('error', function (err) {
                    console.error('[Player] Connection error:', err);
                    setWelcomeStatus('Errore connessione: ' + (err.message || err.type), 'error');
                    document.getElementById('btn-join').disabled = false;
                });
            });

            net.peer.on('error', function (err) {
                console.error('[Player] Peer error:', err);
                if (err.type === 'peer-unavailable') {
                    setWelcomeStatus('Stanza non trovata. Verifica il codice e che il GM sia online.', 'error');
                } else {
                    setWelcomeStatus('Errore: ' + (err.message || err.type), 'error');
                }
                document.getElementById('btn-join').disabled = false;
            });

            net.peer.on('disconnected', function () {
                updateConnIndicator(false);
                try { net.peer.reconnect(); } catch (e) { }
            });
        }

        // ---- PLAYER: Receive from GM ----
        function handlePlayerReceive(data) {
            if (!data || !data.type) return;

            if (data.type === 'SYNC_FULL') {
                // Full state sync on join
                state.scenes = deserializeScenes(data.scenes);
                state.activeSceneId = data.activeSceneId;
                state.chat = data.chat || [];
                state.players = data.players || [];
                state.campaign = data.campaign || state.campaign;
                state.playerName = data.playerInfo ? data.playerInfo.name : 'Giocatore';

                if (!document.getElementById('app').classList.contains('show')) {
                    enterApp();
                }
                renderLeftPanel();
                renderChat();
                renderPlayers();
                drawCanvas();
            }
            else if (data.type === 'CHAT') {
                state.chat.push(data.msg);
                renderChat();
            }
            else if (data.type === 'PLAYER_LIST') {
                state.players = data.players;
                renderPlayers();
            }
            else if (data.type === 'SCENE_CHANGE') {
                state.activeSceneId = data.activeSceneId;
                state.viewport = { x: 0, y: 0, zoom: 1 };
                renderLeftPanel();
                drawCanvas();
            }
            else if (data.type === 'SCENE_ADD') {
                state.scenes[data.scene.id] = deserializeScene(data.scene);
                renderLeftPanel();
            }
        }

        // ---- Serialize scenes (strip non-serializable) ----
        function serializeScenes() {
            var out = {};
            var keys = Object.keys(state.scenes);
            for (var i = 0; i < keys.length; i++) {
                var s = state.scenes[keys[i]];
                out[keys[i]] = { id: s.id, name: s.name, mapAssetId: s.mapAssetId, mapPage: s.mapPage, gridSize: s.gridSize, gridColor: s.gridColor, tokens: s.tokens };
            }
            return out;
        }

        function deserializeScenes(raw) {
            var out = {};
            if (!raw) return out;
            var keys = Object.keys(raw);
            for (var i = 0; i < keys.length; i++) out[keys[i]] = deserializeScene(raw[keys[i]]);
            return out;
        }

        function deserializeScene(s) {
            return { id: s.id, name: s.name, mapAssetId: s.mapAssetId || null, mapPage: s.mapPage || 0, gridSize: s.gridSize || 50, gridColor: s.gridColor || 'rgba(255,255,255,0.08)', tokens: s.tokens || {} };
        }

        // ---- Network send helpers ----
        function netSendChat(msg) {
            if (state.role === 'gm') {
                broadcastFromGM({ type: 'CHAT', msg: msg });
            } else if (net.gmConn && net.gmConn.open) {
                net.gmConn.send({ type: 'CHAT', msg: msg });
            }
        }

        function netSendDiceRoll(msg) {
            if (state.role === 'gm') {
                broadcastFromGM({ type: 'CHAT', msg: msg });
            } else if (net.gmConn && net.gmConn.open) {
                net.gmConn.send({ type: 'DICE_ROLL', msg: msg });
            }
        }

        // ---- Connection indicator ----
        function updateConnIndicator(online) {
            var dot = document.getElementById('conn-indicator');
            if (dot) {
                dot.className = 'conn-dot ' + (online ? 'online' : 'offline');
                dot.title = online ? 'P2P Connesso' : 'P2P Disconnected';
            }
        }

        // ================ CREATE SCENE ================
        function createScene(id, name) {
            return { id: id, name: name, mapAssetId: null, mapPage: 0, gridSize: 50, gridColor: 'rgba(255,255,255,0.08)', tokens: {} };
        }

        // ================ ENTER APP ================
        function enterApp() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('app').classList.add('show');

            var isGM = state.role === 'gm';
            document.getElementById('btn-add-scene').style.display = isGM ? '' : 'none';
            document.getElementById('invite-btn-wrap').style.display = isGM ? '' : 'none';

            var badge = document.getElementById('toolbar-role');
            badge.textContent = isGM ? 'GM' : 'Player';
            badge.className = 'role-badge ' + (isGM ? 'role-gm' : 'role-player');
            document.getElementById('toolbar-campaign').textContent = state.campaign.name;

            resizeCanvas();
            renderLeftPanel();
            renderRightPanel();
        }

        // ================ CANVAS ================
        var canvas = document.getElementById('map-canvas');
        var ctx = canvas.getContext('2d');
        var canvasArea = document.getElementById('canvas-area');

        function resizeCanvas() { canvas.width = canvasArea.clientWidth; canvas.height = canvasArea.clientHeight; drawCanvas(); }
        window.addEventListener('resize', resizeCanvas);

        function drawCanvas() {
            var w = canvas.width, h = canvas.height;
            if (!w || !h) return;
            ctx.fillStyle = '#0a0c10'; ctx.fillRect(0, 0, w, h);
            ctx.save();
            ctx.translate(w / 2 + state.viewport.x, h / 2 + state.viewport.y);
            ctx.scale(state.viewport.zoom, state.viewport.zoom);
            var scene = state.scenes[state.activeSceneId];
            if (!scene) { ctx.restore(); return; }
            var mapAsset = scene.mapAssetId ? state.assets[scene.mapAssetId] : null;
            var mapW = 1400, mapH = 1000;
            if (mapAsset && mapAsset._img) {
                var img = mapAsset._img;
                ctx.drawImage(img, -img.width / 2, -img.height / 2);
                drawGrid(scene, img.width, img.height);
            } else {
                ctx.fillStyle = '#15181e'; ctx.fillRect(-mapW / 2, -mapH / 2, mapW, mapH);
                ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1; ctx.strokeRect(-mapW / 2, -mapH / 2, mapW, mapH);
                drawGrid(scene, mapW, mapH);
                ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.font = '18px system-ui, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('Drag & drop an image or PDF to set as map', 0, 0);
            }
            var tkeys = Object.keys(scene.tokens);
            for (var ti = 0; ti < tkeys.length; ti++) {
                var t = scene.tokens[tkeys[ti]]; var r = (t.size || 1) * scene.gridSize / 2;
                ctx.fillStyle = t.color || '#3b82f6'; ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 2 / state.viewport.zoom; ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = (12 / state.viewport.zoom) + 'px system-ui, sans-serif'; ctx.textAlign = 'center';
                ctx.fillText(t.name, t.x, t.y + r + 14 / state.viewport.zoom);
            }
            ctx.restore();
        }

        function drawGrid(scene, mW, mH) {
            if (!scene.gridSize || scene.gridSize < 10) return;
            var gs = scene.gridSize;
            ctx.strokeStyle = scene.gridColor; ctx.lineWidth = 1 / state.viewport.zoom; ctx.beginPath();
            for (var x = -mW / 2; x <= mW / 2; x += gs) { ctx.moveTo(x, -mH / 2); ctx.lineTo(x, mH / 2); }
            for (var y = -mH / 2; y <= mH / 2; y += gs) { ctx.moveTo(-mW / 2, y); ctx.lineTo(mW / 2, y); }
            ctx.stroke();
        }

        canvasArea.addEventListener('wheel', function (e) { e.preventDefault(); var f = 1.1; if (e.deltaY < 0) state.viewport.zoom = Math.min(state.viewport.zoom * f, 5); else state.viewport.zoom = Math.max(state.viewport.zoom / f, 0.1); drawCanvas(); }, { passive: false });
        canvasArea.addEventListener('pointerdown', function (e) { state.isDragging = true; state.lastMouse = { x: e.clientX, y: e.clientY }; canvasArea.setPointerCapture(e.pointerId); });
        canvasArea.addEventListener('pointermove', function (e) { if (!state.isDragging) return; state.viewport.x += e.clientX - state.lastMouse.x; state.viewport.y += e.clientY - state.lastMouse.y; state.lastMouse = { x: e.clientX, y: e.clientY }; drawCanvas(); });
        canvasArea.addEventListener('pointerup', function (e) { state.isDragging = false; canvasArea.releasePointerCapture(e.pointerId); });
        canvasArea.addEventListener('contextmenu', function (e) { e.preventDefault(); });
        canvasArea.addEventListener('dragover', function (e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
        canvasArea.addEventListener('drop', function (e) { e.preventDefault(); var aid = e.dataTransfer.getData('text/asset-id'); if (aid && state.assets[aid]) { setMapAsset(aid); return; } handleFilesDrop(e.dataTransfer.files, true); });

        // ================ ASSETS ================
        function handleFilesDrop(files, setAsMap) { if (!files || !files.length) return; for (var i = 0; i < files.length; i++) processFile(files[i], setAsMap); }

        function processFile(file, setAsMap) {
            var id = uid(); var isImage = file.type.startsWith('image/'); var isPdf = file.type === 'application/pdf';
            var asset = { id: id, name: file.name, type: isImage ? 'image' : (isPdf ? 'pdf' : 'other'), objectUrl: URL.createObjectURL(file), file: file, pageCount: null, _img: null };
            if (isImage) {
                var img = new Image();
                img.onload = function () { asset._img = img; state.assets[id] = asset; renderLeftPanel(); if (setAsMap) setMapAsset(id); };
                img.src = asset.objectUrl;
            } else if (isPdf && typeof pdfjsLib !== 'undefined') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = '';
                pdfjsLib.getDocument({ url: asset.objectUrl, disableWorker: true }).promise.then(function (pdf) {
                    asset.pageCount = pdf.numPages; asset._pdf = pdf; state.assets[id] = asset; renderLeftPanel();
                    if (setAsMap) renderPdfPageToMap(asset, 1);
                }).catch(function () { state.assets[id] = asset; renderLeftPanel(); });
            } else { state.assets[id] = asset; renderLeftPanel(); }
        }

        function setMapAsset(assetId) {
            var scene = state.scenes[state.activeSceneId]; if (!scene) return;
            var asset = state.assets[assetId]; if (!asset) return;
            scene.mapAssetId = assetId;
            if (asset.type === 'image' && asset._img) drawCanvas();
            else if (asset.type === 'pdf' && asset._pdf) renderPdfPageToMap(asset, 1);
        }

        function renderPdfPageToMap(asset, pageNum) {
            if (!asset._pdf) return;
            asset._pdf.getPage(pageNum).then(function (page) {
                var vp = page.getViewport({ scale: 2 }); var off = document.createElement('canvas'); off.width = vp.width; off.height = vp.height;
                page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise.then(function () {
                    var img = new Image();
                    img.onload = function () { asset._img = img; var sc = state.scenes[state.activeSceneId]; if (sc) sc.mapPage = pageNum; drawCanvas(); };
                    img.src = off.toDataURL('image/png');
                });
            });
        }

        // ================ LEFT PANEL ================
        var leftPanelBody = document.getElementById('left-panel-body');
        var leftPanel = document.getElementById('left-panel');
        leftPanel.addEventListener('dragover', function (e) { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; leftPanel.classList.add('drag-over'); });
        leftPanel.addEventListener('dragleave', function () { leftPanel.classList.remove('drag-over'); });
        leftPanel.addEventListener('drop', function (e) { e.preventDefault(); leftPanel.classList.remove('drag-over'); if (e.dataTransfer.files.length) handleFilesDrop(e.dataTransfer.files, false); });

        function renderLeftPanel() {
            var tab = state.activeLeftTab; var html = '';
            if (tab === 'scenes') {
                html += '<div class="list-header"><span>Campaign Scenes</span></div>';
                var skeys = Object.keys(state.scenes);
                for (var i = 0; i < skeys.length; i++) {
                    var s = state.scenes[skeys[i]]; var ac = s.id === state.activeSceneId ? 'active' : '';
                    html += '<div class="list-item ' + ac + '" onclick="selectScene(\'' + s.id + '\')"><span>&#x1F5FA;</span><span class="name">' + esc(s.name) + '</span></div>';
                }
            } else if (tab === 'assets') {
                html += '<div class="list-header"><span>Local Assets</span><label style="cursor:pointer;display:inline-flex"><input type="file" multiple accept="image/*,.pdf" style="display:none" onchange="onFileInput(event)"><span style="color:var(--accent);font-size:1.2rem;line-height:1">+</span></label></div>';
                var akeys = Object.keys(state.assets);
                if (!akeys.length) { html += '<div class="empty-hint">Drag &amp; Drop images/PDFs here<br>or click + to upload</div>'; }
                else {
                    for (var j = 0; j < akeys.length; j++) {
                        var a = state.assets[akeys[j]]; var icon = a.type === 'image' ? '&#x1F5BC;' : (a.type === 'pdf' ? '&#x1F4C4;' : '&#x1F4CE;');
                        var badge = (a.type === 'pdf' && a.pageCount) ? '<span class="badge">' + a.pageCount + 'p</span>' : '';
                        html += '<div class="list-item" draggable="true" ondragstart="onAssetDragStart(event,\'' + a.id + '\')" onclick="onAssetClick(\'' + a.id + '\')"><span>' + icon + '</span><span class="name">' + esc(a.name) + '</span>' + badge + '</div>';
                    }
                }
            }
            leftPanelBody.innerHTML = html;
        }

        function onFileInput(e) { handleFilesDrop(e.target.files, false); e.target.value = ''; }
        function onAssetDragStart(e, id) { e.dataTransfer.setData('text/asset-id', id); }
        function onAssetClick(id) { var a = state.assets[id]; if (!a) return; setMapAsset(id); showToast('"' + a.name + '" impostata come mappa'); }

        function selectScene(id) {
            state.activeSceneId = id;
            state.viewport = { x: 0, y: 0, zoom: 1 };
            renderLeftPanel();
            drawCanvas();
            // GM broadcasts scene change
            if (state.role === 'gm') {
                broadcastFromGM({ type: 'SCENE_CHANGE', activeSceneId: id });
            }
        }

        document.getElementById('btn-add-scene').addEventListener('click', function () {
            var id = uid();
            var sc = createScene(id, 'Scena ' + (Object.keys(state.scenes).length + 1));
            state.scenes[id] = sc;
            state.activeSceneId = id;
            renderLeftPanel(); drawCanvas();
            if (state.role === 'gm') {
                broadcastFromGM({ type: 'SCENE_ADD', scene: { id: sc.id, name: sc.name, gridSize: sc.gridSize, gridColor: sc.gridColor, tokens: {} } });
                broadcastFromGM({ type: 'SCENE_CHANGE', activeSceneId: id });
            }
        });

        // ================ RIGHT PANEL ================
        function renderRightPanel() {
            var tab = state.activeRightTab;
            document.getElementById('chat-messages').style.display = tab === 'chat' ? '' : 'none';
            document.getElementById('chat-input-area').style.display = tab === 'chat' ? '' : 'none';
            document.getElementById('players-panel').style.display = tab === 'players' ? '' : 'none';
            if (tab === 'chat') renderChat(); else renderPlayers();
        }

        function renderChat() {
            var c = document.getElementById('chat-messages');
            if (!state.chat.length) { c.innerHTML = '<div class="empty-hint">No messages yet. Try /roll 2d6+3</div>'; return; }
            var h = '';
            for (var i = 0; i < state.chat.length; i++) {
                var m = state.chat[i]; var rh = ''; var sysClass = m.system ? ' system' : '';
                if (m.rolls) for (var j = 0; j < m.rolls.length; j++) {
                    var r = m.rolls[j]; var cls = r.natural === 20 ? ' crit' : (r.natural === 1 ? ' fail' : '');
                    rh += '<div class="roll-result"><span>' + esc(r.formula) + '</span><span class="val' + cls + '">' + r.result + '</span></div>';
                }
                h += '<div class="chat-msg' + sysClass + '"><div class="sender">' + esc(m.sender) + '</div><div>' + esc(m.text) + '</div>' + rh + '</div>';
            }
            c.innerHTML = h; c.scrollTop = c.scrollHeight;
        }

        function renderPlayers() {
            var l = document.getElementById('players-list'); var h = '';
            for (var i = 0; i < state.players.length; i++) {
                var p = state.players[i];
                h += '<div class="player-item"><div class="player-dot" style="background:' + p.color + '"></div>' + esc(p.name) + '</div>';
            }
            l.innerHTML = h;
        }

        document.getElementById('chat-input').addEventListener('keydown', function (e) { if (e.key === 'Enter') sendChatMessage(); });

        function sendChatMessage() {
            var input = document.getElementById('chat-input');
            var text = input.value.trim(); if (!text) return; input.value = '';
            var senderName = state.role === 'gm' ? 'GM' : state.playerName;
            var msg = { sender: senderName, text: text, rolls: [] };

            if (text.indexOf('/roll ') === 0 || text.indexOf('/r ') === 0) {
                var formula = text.replace(/^\/(roll|r)\s+/, '');
                var result = parseDiceFormula(formula);
                if (result !== null) msg.rolls.push(result);
            }

            state.chat.push(msg);
            state.activeRightTab = 'chat';
            syncRightPanelTabs();
            renderRightPanel();

            // Send over network
            netSendChat(msg);
        }

        function addSystemChat(text) {
            var msg = { sender: 'Sistema', text: text, rolls: [], system: true };
            state.chat.push(msg);
            renderChat();
        }

        // ================ DICE ================
        function parseDiceFormula(formula) {
            try {
                var total = 0; var natural = null;
                var parts = formula.replace(/\s/g, '').match(/[+-]?(\d*d\d+|\d+)/gi);
                if (!parts) return null;
                for (var i = 0; i < parts.length; i++) {
                    var dm = parts[i].match(/^([+-]?)(\d*)d(\d+)$/i);
                    if (dm) {
                        var sign = dm[1] === '-' ? -1 : 1; var count = parseInt(dm[2] || '1'); var sides = parseInt(dm[3]);
                        for (var j = 0; j < count; j++) { var roll = Math.floor(Math.random() * sides) + 1; if (count === 1 && parts.length <= 2) natural = roll; total += sign * roll; }
                    } else total += parseInt(parts[i]);
                }
                return { formula: formula, result: total, natural: natural };
            } catch (e) { return null; }
        }

        function rollDice(sides) {
            var roll = Math.floor(Math.random() * sides) + 1;
            var senderName = state.role === 'gm' ? 'GM' : state.playerName;
            var msg = { sender: senderName, text: 'Rolled d' + sides, rolls: [{ formula: '1d' + sides, result: roll, natural: roll }] };
            state.chat.push(msg);
            state.activeRightTab = 'chat';
            syncRightPanelTabs();
            renderRightPanel();
            netSendDiceRoll(msg);
        }

        // ================ MODALS ================
        function showInviteModal() { document.getElementById('invite-code-display').textContent = state.inviteCode; document.getElementById('invite-modal-bg').classList.add('show'); }
        function closeModal(id) { document.getElementById(id).classList.remove('show'); }
        function copyInviteCode() { navigator.clipboard.writeText(state.inviteCode).then(function () { showToast('Codice copiato!'); }).catch(function () { showToast('Seleziona e copia manualmente'); }); }
        document.getElementById('invite-modal-bg').addEventListener('click', function (e) { if (e.target === e.currentTarget) closeModal('invite-modal-bg'); });

        // ================ TABS ================
        document.querySelectorAll('#left-panel .panel-tabs button').forEach(function (b) { b.addEventListener('click', function () { state.activeLeftTab = b.dataset.tab; syncLeftPanelTabs(); renderLeftPanel(); }); });
        document.querySelectorAll('#right-panel .panel-tabs button').forEach(function (b) { b.addEventListener('click', function () { state.activeRightTab = b.dataset.tab; syncRightPanelTabs(); renderRightPanel(); }); });
        function syncLeftPanelTabs() { document.querySelectorAll('#left-panel .panel-tabs button').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === state.activeLeftTab); }); }
        function syncRightPanelTabs() { document.querySelectorAll('#right-panel .panel-tabs button').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === state.activeRightTab); }); }

        // ================ UTILS ================
        function esc(s) { var e = document.createElement('span'); e.textContent = s; return e.innerHTML; }
        function showToast(msg) { var t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(t._to); t._to = setTimeout(function () { t.classList.remove('show'); }, 2500); }
    </script>
</body>
